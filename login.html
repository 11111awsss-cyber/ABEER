<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#000;color:#fff;text-align:center;padding:30px">

<h2>دخول الأدمن</h2>

<input id="u" placeholder="username"><br><br>
<input id="p" type="password" placeholder="password"><br><br>

<button onclick="go()">دخول</button>

<script>
function go(){
if(u.value==="admin" && p.value==="admin"){
localStorage.setItem("auth","1");
location="admin.html";
}else alert("خطأ");
}
</script>

</body>
</html>
