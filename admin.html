<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#000;color:#fff;padding:20px">

<h2>النتائج</h2>
<div id="data"></div>

<script>
if(localStorage.getItem("auth")!=="1"){location="login.html";}

let d = JSON.parse(localStorage.getItem("data")||"[]");
let div = document.getElementById("data");

d.forEach(x=>{
div.innerHTML += `
<hr>
<p>المدرسة: ${x.school}</p>
<p>أولياء الأمور: ${x.q1}</p>
<p>الطلبة: ${x.q2}</p>
<p>الرضا العام: ${x.q3}</p>
<p>ملاحظات: ${x.notes}</p>
`;
});
</script>

</body>
</html>
